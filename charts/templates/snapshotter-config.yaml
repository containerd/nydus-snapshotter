apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nydus-snapshotter.configmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nydus-snapshotter.labels" . | nindent 4 }}
data:
  config.toml: |
    {{- include "nydus-snapshotter.snapshotterConfig" . | nindent 4 }}
