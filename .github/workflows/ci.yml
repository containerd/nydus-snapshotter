name: CI

on:
  push:
    branches: ["**", "stable/**"]
  pull_request:
    branches: ["**", "stable/**"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  security:
    name: Security scan
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck="$(go env GOPATH)/bin/govulncheck"

          # GO-2026-5932: golang.org/x/crypto/openpgp is deprecated, unmaintained
          # and has no fixed version. It is pulled in and used transitively via
          # github.com/containers/ocicrypt, whose maintainers have decided to keep
          # using it (https://github.com/containers/ocicrypt/issues/58), so it
          # cannot be resolved by bumping dependencies. Suppress only this advisory
          # while still failing on any other (existing or future) called vulnerability.
          ignore="GO-2026-5932"

          # -format json makes govulncheck exit 0 regardless of findings, so we
          # gate on the parsed output instead.
          "$govulncheck" -format json ./... > govulncheck.json

          echo "Called vulnerabilities found by govulncheck:"
          jq -r 'select(.finding != null and .finding.trace[0].function != null) | .finding.osv' \
            govulncheck.json | sort -u

          remaining="$(jq -r --arg ignore "$ignore" \
            'select(.finding != null and .finding.trace[0].function != null) | .finding.osv | select(. != $ignore)' \
            govulncheck.json | sort -u)"

          if [ -n "$remaining" ]; then
            echo "::error::govulncheck found actionable vulnerabilities:"
            echo "$remaining"
            exit 1
          fi

          echo "No actionable vulnerabilities (ignoring: ${ignore})."
      - name: OSV-Scanner
        run: |
          go install github.com/google/osv-scanner/cmd/osv-scanner@v1
          "$(go env GOPATH)/bin/osv-scanner" --config=osv-scanner.toml -r .
  build:
    name: Build and Lint
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Prebuilt golangci-lint v2.1.x is built with Go 1.24; go.mod requires Go 1.25+.
          install-mode: goinstall
          version: v2.1.6
          skip-cache: true
      - name: Build
        run: |
          make
          make test
  build-optimizer:
    name: Build optimizer
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Build
        run: |
          rustup component add rustfmt clippy
          make build-optimizer
  smoke:
    name: Smoke
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Set up containerd
        uses: crazy-max/ghaction-setup-containerd@v3
      - name: Build
        run: |
          # Download nydus components
          NYDUS_VER=v$(curl -fsSL --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' "https://api.github.com/repos/dragonflyoss/nydus/releases/latest" | jq -r .tag_name | sed 's/^v//')
          wget -q https://github.com/dragonflyoss/nydus/releases/download/$NYDUS_VER/nydus-static-$NYDUS_VER-linux-amd64.tgz
          tar xzvf nydus-static-$NYDUS_VER-linux-amd64.tgz
          mkdir -p /usr/bin
          sudo mv nydus-static/nydus-image nydus-static/nydusd nydus-static/nydusify /usr/bin/
          export PATH=$PATH:$(go env GOPATH)/bin
          make smoke

  cross-build-test:
    name: Cross Build Test
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        GOOS: ["linux", "windows", "darwin"]
        GOARCH: ["amd64", "arm64"]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Build
        run: |
          make -e GOOS=${{ matrix.GOOS }} GOARCH=${{ matrix.GOARCH }} converter

  coverage:
    name: Code coverage
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Run unit tests.
        run: make cover
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # not required for public repos
          files: ./coverage.txt
